<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Portal</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="home.html">Shopy</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
                <li class="nav-item"><a class="nav-link" href="contact.html">Contact Us</a></li>
                <li class="nav-item"><a class="nav-link" href="cart.html">Cart <span id="cart-count"
                            class="badge badge-primary">0</span></a></li>
            </ul>
        </div>
    </nav>

    <div class="container my-5">
        <h1 class="text-center font-weight-bold">Payment Portal</h1>
        <h2>Cart Summary</h2>
        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th>Product Name</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="cart-summary"></tbody>
            </table>
        </div>
        <h3 style="text-align: right; margin-right: 90px;">Total: ₨ <span id="payment-total">0</span></h3>
    </div>

    <div class="container my-5">
        <form id="payment-form">
            <h2>Billing Address</h2>
            <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" class="form-control" id="firstName" required>
            </div>
            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" class="form-control" id="lastName" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" class="form-control" id="email" required>
            </div>
            <div class="form-group">
                <label for="number">Mobile Number</label>
                <input type="tel" class="form-control" id="number" required>
            </div>
            <div class="form-group">
                <label for="address">Address</label>
                <input type="text" class="form-control" id="address" required>
            </div>
            <div class="form-group">
                <label for="country">Country</label>
                <select class="form-control" id="country" required>
                    <option value="">Choose...</option>
                    <option>India</option>
                </select>
            </div>
            <div class="form-group">
                <label for="state">State</label>
                <select class="form-control" id="state" required>
                    <option value="">Choose...</option>
                    <option>Andhra Pradesh</option>
                    <option>Arunachal Pradesh</option>
                    <option>Assam</option>
                    <option>Bihar</option>
                    <option>Chhattisgarh</option>
                    <option>Goa</option>
                    <option>Gujarat</option>
                    <option>Haryana</option>
                    <option>Himachal Pradesh</option>
                    <option>Jharkhand</option>
                    <option>Karnataka</option>
                    <option>Kerala</option>
                    <option>Madhya Pradesh</option>
                    <option>Maharashtra</option>
                    <option>Manipur</option>
                    <option>Meghalaya</option>
                    <option>Mizoram</option>
                    <option>Nagaland</option>
                    <option>Odisha</option>
                    <option>Punjab</option>
                    <option>Rajasthan</option>
                    <option>Sikkim</option>
                    <option>Tamil Nadu</option>
                    <option>Telangana</option>
                    <option>Tripura</option>
                    <option>Uttar Pradesh</option>
                    <option>Uttarakhand</option>
                    <option>West Bengal</option>
                    <option>Andaman and Nicobar Islands</option>
                    <option>Chandigarh</option>
                    <option>Dadra and Nagar Haveli and Daman and Diu</option>
                    <option>Delhi</option>
                    <option>Lakshadweep</option>
                    <option>Puducherry</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="pin">Pin Code</label>
                <input type="text" class="form-control" id="Pin" required>
            </div>

            <h2>Payment Options</h2>
            <div class="form-group">
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="payment-method" id="debit-card" value="debit-card" required>
                    <label class="form-check-label" for="debit-card">Debit Card</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="payment-method" id="credit-card" value="credit-card">
                    <label class="form-check-label" for="credit-card">Credit Card</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="payment-method" id="net-banking" value="net-banking">
                    <label class="form-check-label" for="net-banking">Net Banking</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="payment-method" id="upi" value="upi">
                    <label class="form-check-label" for="upi">UPI</label>
                </div>
            </div>

            <div id="card-details" class="d-none">
                <h3>Card Details</h3>
                <div class="form-group">
                    <label for="card-name">Cardholder Name</label>
                    <input type="text" class="form-control" id="card-name">
                </div>
                <div class="form-group">
                    <label for="card-number">Card Number</label>
                    <input type="text" class="form-control" id="card-number">
                </div>
                <div class="form-group">
                    <label for="expiry-date">Expiry Date (MM/YY)</label>
                    <input type="text" class="form-control" id="expiry-date" placeholder="MM/YY">
                </div>
                <div class="form-group">
                    <label for="cvv">CVV</label>
                    <input type="text" class="form-control" id="cvv">
                </div>
            </div>

            <div id="net-banking-details" class="d-none">
                <h3>Net Banking Details</h3>
                <div class="form-group">
                    <label for="bank-name">Select Bank</label>
                    <select class="form-control" id="bank-name">
                        <option value="">Choose...</option>
                        <option>State Bank of India</option>
                        <option>ICICI Bank</option>
                        <option>HDFC Bank</option>
                    </select>
                </div>
            </div>

            <div id="upi-details" class="d-none">
                <h3>UPI Details</h3>
                <div class="form-group">
                    <label for="upi-id">UPI ID</label>
                    <input type="text" class="form-control" id="upi-id" placeholder="example@upi">
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Continue to Pay</button>
        </form>
    </div>

    <script>
        $(document).ready(function () {
            const togglePaymentDetails = () => {
                const paymentMethod = $('input[name="payment-method"]:checked').val();
                $('#card-details, #net-banking-details, #upi-details').addClass('d-none');
                if (paymentMethod === 'debit-card' || paymentMethod === 'credit-card') {
                    $('#card-details').removeClass('d-none');
                } else if (paymentMethod === 'net-banking') {
                    $('#net-banking-details').removeClass('d-none');
                } else if (paymentMethod === 'upi') {
                    $('#upi-details').removeClass('d-none');
                }
            };

            $('input[name="payment-method"]').on('change', togglePaymentDetails);

            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            console.log("Cart:", cart); // Debugging line
            const updateSummary = () => {
                let total = 0;
                $('#cart-summary').empty();
                cart.forEach(item => {
                    const row = `
                        <tr>
                            <td>${item.name}</td>
                            <td>₨ ${item.price}</td>
                            <td>${item.quantity}</td>
                            <td>₨ ${item.price * item.quantity}</td>
                        </tr>`;
                    $('#cart-summary').append(row);
                    total += item.price * item.quantity;
                });
                $('#payment-total').text(total);
            };

            $('#payment-form').submit(function (e) {
                e.preventDefault();
                localStorage.removeItem('cart');
                console.log("Payment form submitted. Cart cleared.");
                window.location.href = "confirmation.html";  // Redirect to confirmation page
            });

            updateSummary();
        });
    </script>
        <script>
            $(document).ready(function () {
                let cart = JSON.parse(localStorage.getItem('cart')) || [];
                const updateCartCount = () => $('#cart-count').text(cart.length);
                updateCartCount();
            });
        </script>

    <!-- Include Bootstrap and Popper.js -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>


</html>
