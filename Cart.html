<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <!-- Bootstrap CSS -->
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="home.html">Shopy</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
                <li class="nav-item"><a class="nav-link" href="contact.html">Contact Us</a></li>
                <li class="nav-item">
                    <a class="nav-link active" href="cart.html">Cart 
                        <span id="cart-count" class="badge badge-primary">0</span>
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container my-5">
        <h1>Shopping Cart</h1>
        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th>Product Name</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Total</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="cart-items"></tbody>
            </table>
        </div>
        <h3>Total: ₨ <span id="cart-total">0</span></h3>
        <button id="checkout-btn" class="btn btn-primary">Proceed to Checkout</button>
    </div>

    <!-- JavaScript Dependencies -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

    <!-- Shopping Cart Script -->
    <script>
        $(document).ready(function () {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            
            const updateCartCount = () => {
                const cart = JSON.parse(localStorage.getItem('cart')) || [];
                const distinctProductCount = cart.length;
                $('#cart-count').text(distinctProductCount);
            };

            const updateCart = () => {
                let total = 0;
                $('#cart-items').empty();
                cart.forEach((item, index) => {
                    const row = `
                        <tr>
                            <td>${item.name}</td>
                            <td>₨ ${item.price}</td>
                            <td>
                                <input type="number" value="${item.quantity}" data-index="${index}" class="form-control quantity" min="1">
                            </td>
                            <td>₨ ${item.price * item.quantity}</td>
                            <td>
                                <button data-index="${index}" class="btn btn-danger remove-item">Remove</button>
                            </td>
                        </tr>`;
                    $('#cart-items').append(row);
                    total += item.price * item.quantity;
                });
                $('#cart-total').text(total);
                localStorage.setItem('cart', JSON.stringify(cart));

                // Update cart count
                updateCartCount();
            };

            // Validate and update quantity
            $(document).on('input', '.quantity', function () {
                const index = $(this).data('index');
                let newQuantity = parseInt($(this).val());
                if (isNaN(newQuantity) || newQuantity < 1) {
                    newQuantity = 1; // Default to 1 if invalid
                    $(this).val(newQuantity);
                }
                cart[index].quantity = newQuantity;
                updateCart();
            });

            // Remove item from cart
            $(document).on('click', '.remove-item', function () {
                const index = $(this).data('index');
                cart.splice(index, 1);
                updateCart();
            });

            // Handle checkout
            $('#checkout-btn').click(function () {
                if (cart.length === 0) {
                    alert('Your cart is empty!');
                } else {
                    window.location.href = 'payment.html';
                }
            });

            // Initialize cart
            updateCart();
        });
    </script>
</body>
</html>
