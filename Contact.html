<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="home.html">Shopy</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
                <li class="nav-item"><a class="nav-link active" href="contact.html">Contact Us</a></li>
                <li class="nav-item"><a class="nav-link" href="cart.html">Cart <span id="cart-count" class="badge badge-primary">0</span></a></li>
            </ul>
        </div>
    </nav>
    <div class="container my-5">
        <h1 class="text-center">Contact Us</h1>
        <p class="text-center">Feel free to reach out to us at <strong>query@Shopy.com</strong></p>
    </div>
    <div class="container my-5">
        <h2>Get in touch with us</h2>
        <form id="contact-form">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" class="form-control" placeholder="Enter your name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" class="form-control" rows="5" placeholder="Your message" required></textarea>
            </div>
            <button class="btn btn-primary" type="submit" style="background-color: #C1A1E1; color: white; border: none; border-radius: 5px; font-size: 1.2rem;">Submit</button>
        </form>
        <br>
        <a href="home.html" class="btn btn-primary">Go Back to Home</a>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.7/dist/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        $(document).ready(function () {
            const updateCartCount = () => {
                const cart = JSON.parse(localStorage.getItem('cart')) || [];
                const distinctProductCount = cart.length;
                $('#cart-count').text(distinctProductCount);
            };
            updateCartCount();
        });
    </script>
    <script>
        $(document).ready(function () {
            $('#contact-form').on('submit', function (event) {
                event.preventDefault(); // Prevent default form submission
                alert('Thank you for contacting us! Your message has been received. You will receive a mail soon regarding your query.');
                $('#contact-form')[0].reset(); // Reset the form fields
            });
        });
    </script>
</body>
</html>
